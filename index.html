<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleprompter Mobile Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #1a1a1a;
            --accent: #007bff;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            touch-action: manipulation;
        }

        /* TELA DE CONFIGURAÇÃO */
        #editor-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        h2 { text-align: center; margin: 10px 0; font-size: 1.5rem; }

        textarea {
            flex-grow: 1;
            min-height: 200px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            resize: none;
            margin-bottom: 15px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 0.8rem; text-transform: uppercase; color: #888; }

        select, input[type="range"] {
            width: 100%;
            height: 40px;
        }

        .btn-main {
            background: #28a745;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }

        /* TELA DO PROMPTER */
        #prompter-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 1000;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        #prompter-view::-webkit-scrollbar { display: none; }

        #prompter-content {
            padding: 50vh 20px; /* Margem para o texto começar no meio */
            white-space: pre-wrap;
            word-wrap: break-word;
            transition: transform 0.1s linear;
        }

        /* Classes de Espelhamento */
        .mirror-h { transform: scaleX(-1); }
        .mirror-v { transform: scaleY(-1); }
        .mirror-both { transform: scale(-1, -1); }

        /* Interface de Controle no Celular (Overlay) */
        #mobile-menu {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 2000;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        #mobile-menu:hover, #mobile-menu:active { opacity: 1; }

        .btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .indicator {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.4);
            pointer-events: none;
            z-index: 1500;
        }
    </style>
</head>
<body>

    <!-- INTERFACE DO EDITOR -->
    <div id="editor-container">
        <h2>Teleprompter BR</h2>
        <textarea id="script-input" placeholder="Digite ou cole seu texto aqui..."></textarea>
        
        <div class="controls-grid">
            <div class="control-group">
                <label>Velocidade</label>
                <input type="range" id="speed-input" min="0" max="15" step="0.5" value="3">
            </div>
            <div class="control-group">
                <label>Fonte</label>
                <input type="range" id="font-size-input" min="16" max="100" value="40">
            </div>
            <div class="control-group">
                <label>Espelhamento</label>
                <select id="mirror-select">
                    <option value="none">Normal</option>
                    <option value="horizontal">Horizontal (Espelho)</option>
                    <option value="vertical">Vertical (Inverter)</option>
                    <option value="both">Ambos</option>
                </select>
            </div>
            <div class="control-group">
                <label>Margens</label>
                <input type="range" id="margin-input" min="5" max="25" value="10">
            </div>
        </div>
        
        <button class="btn-main" onclick="startPrompter()">INICIAR</button>
    </div>

    <!-- INTERFACE DO PROMPTER -->
    <div id="prompter-view">
        <div id="prompter-content"></div>
        <div class="indicator"></div>
        
        <!-- Controles Flutuantes -->
        <div id="mobile-menu">
            <button class="btn-circle" onclick="changeSpeed(-1)">-</button>
            <button class="btn-circle" onclick="togglePlay()" id="play-btn">▶</button>
            <button class="btn-circle" onclick="changeSpeed(1)">+</button>
            <button class="btn-circle" onclick="stopPrompter()" style="background:rgba(255,0,0,0.3)">✕</button>
        </div>
    </div>

    <script>
        let scrolling = false;
        let animationFrame;
        const view = document.getElementById('prompter-view');
        const content = document.getElementById('prompter-content');
        const speedInput = document.getElementById('speed-input');
        const playBtn = document.getElementById('play-btn');

        // Impede que a tela do celular apague (Wake Lock API)
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(err.name, err.message); }
        }

        function startPrompter() {
            const text = document.getElementById('script-input').value || "Adicione um texto primeiro...";
            content.innerText = text;
            
            // Aplicar Estilos
            content.style.fontSize = document.getElementById('font-size-input').value + 'px';
            content.style.paddingLeft = document.getElementById('margin-input').value + '%';
            content.style.paddingRight = document.getElementById('margin-input').value + '%';
            
            // Aplicar Espelhamento
            content.classList.remove('mirror-h', 'mirror-v', 'mirror-both');
            const mode = document.getElementById('mirror-select').value;
            if (mode === 'horizontal') content.classList.add('mirror-h');
            else if (mode === 'vertical') content.classList.add('mirror-v');
            else if (mode === 'both') content.classList.add('mirror-both');

            // Entrar em tela cheia se possível
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            // Mudar tela
            document.getElementById('editor-container').style.display = 'none';
            view.style.display = 'block';
            view.scrollTop = 0;
            scrolling = false;
            playBtn.innerText = "▶";
            
            requestWakeLock();
        }

        function stopPrompter() {
            scrolling = false;
            cancelAnimationFrame(animationFrame);
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            view.style.display = 'none';
            document.getElementById('editor-container').style.display = 'flex';
            if (wakeLock) wakeLock.release();
        }

        function togglePlay() {
            scrolling = !scrolling;
            playBtn.innerText = scrolling ? "⏸" : "▶";
            if (scrolling) autoScroll();
        }

        function autoScroll() {
            if (!scrolling) return;
            const speed = parseFloat(speedInput.value);
            view.scrollTop += speed / 5; // Ajuste fino para suavidade no mobile
            animationFrame = requestAnimationFrame(autoScroll);
        }

        function changeSpeed(delta) {
            let newVal = parseFloat(speedInput.value) + delta;
            if (newVal < 0) newVal = 0;
            if (newVal > 15) newVal = 15;
            speedInput.value = newVal;
        }

        // Toque na tela do prompter também inicia/pausa
        view.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                togglePlay();
            }
        });

        // Atalhos de teclado (para quando usar com teclado bluetooth no celular)
        window.addEventListener('keydown', (e) => {
            if (view.style.display === 'block') {
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
                if (e.code === 'Escape') stopPrompter();
                if (e.code === 'ArrowUp') changeSpeed(0.5);
                if (e.code === 'ArrowDown') changeSpeed(-0.5);
            }
        });
    </script>
</body>
</html>
